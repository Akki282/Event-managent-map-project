syntax = "proto3";

package eventmanagement;

import "google/protobuf/timestamp.proto";


// ================= USER SERVICE =================

service UserService {

  rpc GetUser (UserRequest) returns (UserResponse);

  rpc UpdateUser (UpdateUserRequest) returns (UserResponse);

  rpc DeleteUser (UserRequest) returns (DeleteUserResponse);

}


// ================= EVENT SERVICE =================

service EventService {

  rpc CreateEvent (CreateEventRequest) returns (EventResponse);

  rpc GetEvent (EventRequest) returns (EventResponse);
  
  rpc AddGuestToEvent (AddGuestRequest) returns (EventResponse);
  
  rpc AddVendorToEvent (AddVendorRequest) returns (EventResponse);

}


// ================= VENDOR SERVICE =================

service VendorService {

  rpc GetVendor (VendorRequest) returns (VendorResponse);

  rpc CreateVendor (CreateVendorRequest) returns (VendorResponse);

}



// ================= DATA MODELS =================

message User {

  string id = 1;

  string name = 2;

  string email = 3;

  string contactNumber = 4;

  repeated string events = 5;

}


message Event {

  string id = 1;
  
  string name = 2;
  
  string date = 3;
  
  string venue = 4;
  
  repeated string guests = 5;
  
  repeated string vendors = 6;

}



message Vendor {

  string id = 1;

  string name = 2;

  string email = 3;

  string contactNumber = 4;

  VendorType type = 5;

}



// ================= ENUM =================

enum VendorType {

  UNKNOWN = 0;

  CATERING = 1;

  DECORATION = 2;

  PHOTOGRAPHY = 3;

  MUSIC = 4;

  LIGHTING = 5;

}



// ================= REQUEST MESSAGES =================

message UserRequest {

  string id = 1;

}


message EventRequest {

  string id = 1;

}


message VendorRequest {

  string id = 1;

}


message UpdateUserRequest {

  string id = 1;

  string name = 2;

  string contactNumber = 3;

}


message CreateEventRequest {

  string name = 1;

  string date = 2;

  string venue = 3;

}


message AddGuestRequest {

  string eventId = 1;

  string userId = 2;

}


message AddVendorRequest {

  string eventId = 1;

  string vendorId = 2;

}


message CreateVendorRequest {

  string name = 1;

  string email = 2;

  string contactNumber = 3;

  VendorType type = 4;

}



// ================= RESPONSE MESSAGES =================

message UserResponse {

  User user = 1;

}


message EventResponse {

  Event event = 1;

}


message VendorResponse {

  Vendor vendor = 1;

}


message DeleteUserResponse {

  string message = 1;

}