syntax = "proto3";

package auth;

service AuthService {

  rpc Register (RegisterRequest) returns (AuthResponse);

  rpc Login (LoginRequest) returns (OtpResponse);

  rpc VerifyOtp (VerifyOtpRequest) returns (AuthResponse);

}

message RegisterRequest {

  string name = 1;
  string email = 2;
  string contactNumber = 3;

}

message LoginRequest {

  string email = 1;

}

message VerifyOtpRequest {

  string email = 1;
  string otp = 2;

}

message OtpResponse {

  string message = 1;
  string otp = 2;

}

message AuthResponse {

  string message = 1;
  string token = 2;

}