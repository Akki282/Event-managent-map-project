syntax = "proto3";

package auth;

service AuthService {
  rpc RegisterUser (RegisterRequest) returns (AuthResponse);
  rpc LoginUser (LoginRequest) returns (OtpResponse);
  rpc VerifyOtp (VerifyRequest) returns (TokenResponse);
}

message RegisterRequest {
  string name = 1;
  string email = 2;
  string contactNumber = 3;
}

message LoginRequest {
  string email = 1;
}

message VerifyRequest {
  string email = 1;
  string otp = 2;
}

message AuthResponse {
  string message = 1;
  string otp = 2;
}

message OtpResponse {
  string message = 1;
  string otp = 2;
}

message TokenResponse {
  string message = 1;
  string token = 2;
}